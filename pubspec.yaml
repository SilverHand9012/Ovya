name: ovya
description: A production-level Flutter app with clean architecture and offline-first design.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  go_router: ^17.2.1
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.0
  connectivity_plus: ^7.1.1
  firebase_ai: ^3.11.0
  cloud_firestore: ^6.3.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  shared_preferences: ^2.3.0
  pdf: ^3.10.8
  printing: ^5.12.0
  uuid: ^4.5.3
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSansDevanagari-Regular.ttf
    - assets/images/illustrations/
